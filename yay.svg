<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe3e6"/>
      <stop offset="1" stop-color="#fff0f1"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b76"/>
      <stop offset="1" stop-color="#e94d58"/>
    </linearGradient>
  </defs>
  <rect width="320" height="280" rx="18" fill="url(#bg)"/>

  <!-- конфетти -->
  <g opacity="0.85">
    <circle cx="40" cy="50" r="5" fill="#e94d58"/>
    <circle cx="280" cy="60" r="6" fill="#ffb3bb"/>
    <rect x="60" y="200" width="9" height="9" rx="2" fill="#ff8a93" transform="rotate(20 64 204)"/>
    <rect x="250" y="200" width="9" height="9" rx="2" fill="#e94d58" transform="rotate(-25 254 204)"/>
    <circle cx="270" cy="160" r="4" fill="#e94d58"/>
    <circle cx="46" cy="150" r="4" fill="#ff8a93"/>
    <path d="M30 110 l4 8 l-8 0 z" fill="#ffb3bb"/>
    <path d="M292 120 l4 8 l-8 0 z" fill="#e94d58"/>
  </g>

  <!-- большое сердце -->
  <path d="M160 230
           C 110 190, 70 160, 70 120
           C 70 92, 92 72, 118 72
           C 138 72, 154 84, 160 100
           C 166 84, 182 72, 202 72
           C 228 72, 250 92, 250 120
           C 250 160, 210 190, 160 230 Z"
        fill="url(#heart)"/>

  <!-- блик на сердце -->
  <ellipse cx="120" cy="108" rx="16" ry="10" fill="#ffffff" opacity="0.35" transform="rotate(-25 120 108)"/>

  <!-- улыбка/глазки на сердце -->
  <circle cx="138" cy="128" r="6" fill="#fff"/>
  <circle cx="182" cy="128" r="6" fill="#fff"/>
  <path d="M134 152 Q160 174 186 152" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- "Да!" сверху -->
  <text x="160" y="48" text-anchor="middle" font-size="34" font-weight="700" fill="#e94d58">Да! 💖</text>
</svg>
